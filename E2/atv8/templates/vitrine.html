<h1>{{ titulo }}</h1>
<p>{{ total }} produtos</p>

<style>
  .vermelho {
    color: red;
  }
</style>

<ul>
 {% for produto in produtos %}
 {% if produto.preco < 50 %}
 <p class="vermelho">{{ produto.nome }} {{ produto.preco }}</p>
 {% else %}
 {{ produto.nome }} {{ produto.preco }}</p>
 {% endif %}
 {% endfor %}
</ul>

{% if promocao %}
 <div>🔥 Promoção ativa!</div>
{% endif %}
