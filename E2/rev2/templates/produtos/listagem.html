{% extends 'base.html' %}
{% block content %}
<h1>Produtos</h1>
<table>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Categoria</th>
        <th>Preço</th>
    </tr>
    {% for produto in produtos %}
    <tr>
        <td><a href="">{{ produto.id }}</a></td>
        <td>{{ produto.nome }}</td>
        <td>{{ produto.categoria }}</td>
        <td>{{ produto.preco }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
