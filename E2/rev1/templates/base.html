{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            display:flex;
            flex-direction:column;
            min-height:100vh;
            background:#f4f4f4;
        }

        header{
            background:#1f4e79;
            color:white;
            padding:25px;
            text-align:center;
        }

        nav{
            background:#163b5d;
        }

        nav ul{
            display:flex;
            justify-content:center;
            list-style:none;
        }

        nav li{
            margin:0 20px;
        }

        nav a{
            display:block;
            padding:15px;
            color:white;
            text-decoration:none;
            transition:0.3s;
        }

        nav a:hover{
            background:#2f6ea3;
        }

        main{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:40px;
        }

        footer{
            background:#1f4e79;
            color:white;
            text-align:center;
            padding:15px;
        }
    </style>
</head>
<body>

    {% include 'partials/navbar.html' %}

    {% block main %}
    {% endblock %}

    {% include 'partials.footer.html' %}

</body>
</html>
