{% extends 'base.html' %}
{% load static %}
{% block title %} Listagem {% endblock %}

{% block content %}
  <main>
    <h2>Catálogo de Itens</h2>

    <table class="tabela-listagem">
      <thead>
        <tr>
          <th>Título</th>
          <th>Desenvolvedora</th>
          <th>Ano</th>
          <th>Gênero</th>
        </tr>
      </thead>
      <tbody>
        {% for jogo in jogos %}
        <tr>
          <td><a href="{% url 'jogos:detalhe' jogo.id %}">{{ jogo.titulo }}</a></td>
          <td>{{ jogo.desenvolvedora }}</td>
          <td>{{ jogo.ano }}</td>
          <td>{{ jogo.genero }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </main>

{% endblock %}
