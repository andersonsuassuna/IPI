{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Market System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>MarketSys</h2>
        <a href="#">Dashboard</a>
        <a href="{% url 'produtos:home' %}">Produtos</a>
        <a href="#">Clientes</a>
        <a href="#">Vendas</a>
        <a href="#">Compras</a>
    </div>

    <!-- Main -->
    <div class="main">

        <div class="header">
            <h1>Dashboard</h1>
            <input type="text" id="search" placeholder="Buscar...">
        </div>

        <!-- Cards -->
        <div class="cards">
            <div class="card">
                <h3>Produtos</h3>
                <p id="prod-count">120</p>
            </div>

            <div class="card">
                <h3>Clientes</h3>
                <p id="client-count">45</p>
            </div>

            <div class="card">
                <h3>Vendas</h3>
                <p id="sales-count">230</p>
            </div>

            <div class="card">
                <h3>Compras</h3>
                <p id="buy-count">80</p>
            </div>
        </div>

        <!-- Table -->
        <table id="table">
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Preço</th>
                    <th>Estoque</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Arroz</td>
                    <td>R$ 20</td>
                    <td>50</td>
                    <td><button onclick="alert('Editar produto')">Editar</button></td>
                </tr>
                <tr>
                    <td>Feijão</td>
                    <td>R$ 10</td>
                    <td>30</td>
                    <td><button onclick="alert('Editar produto')">Editar</button></td>
                </tr>
            </tbody>
        </table>

    </div>

    <script>
        // Busca simples na tabela
        const searchInput = document.getElementById("search");

        searchInput.addEventListener("keyup", function () {
            let filter = searchInput.value.toLowerCase();
            let rows = document.querySelectorAll("#table tbody tr");

            rows.forEach(row => {
                let text = row.innerText.toLowerCase();
                row.style.display = text.includes(filter) ? "" : "none";
            });
        });

        // Simulação de dados dinâmicos
        function updateDashboard() {
            document.getElementById("prod-count").innerText = Math.floor(Math.random() * 200);
            document.getElementById("client-count").innerText = Math.floor(Math.random() * 100);
            document.getElementById("sales-count").innerText = Math.floor(Math.random() * 300);
            document.getElementById("buy-count").innerText = Math.floor(Math.random() * 150);
        }

        setInterval(updateDashboard, 5000);
    </script>

</body>
</html>
