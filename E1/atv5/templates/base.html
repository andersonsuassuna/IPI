{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema Escolar{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <div class="logo">
            <!-- Certifique-se de que a imagem existe em alunos/static/alunos/img/logo.png -->
            <img src="{% static 'alunos/img/logo.png' %}" alt="Logo IFRN" height="50">
        </div>
        <nav>
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'alunos:lista' %}">Lista de Alunos</a>
        </nav>
    </header>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 - Sistema de Gestão Escolar - IFRN</p>
    </footer>
</body>
</html>
