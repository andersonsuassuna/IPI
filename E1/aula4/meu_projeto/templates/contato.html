<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f9fafb;
            color: #111827;
        }

        header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 15px 30px;
        }

        nav {
            max-width: 1000px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: #374151;
            font-weight: 500;
        }

        nav a:hover { color: #111827; }

        main {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }

        h2 {
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input, textarea {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            font-size: 14px;
        }

        button {
            padding: 10px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #6b7280;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <h1>Meu Blog</h1>
        <ul>
            <li><a href="{% url 'home' %}">Início</a></li>
            <li><a href="{% url 'sobre' %}">Sobre</a></li>
            <li><a href="{% url 'contato' %}">Contato</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="card">
        <h2>Contato</h2>

        <form method="post">
            {% csrf_token %}
            <input type="text" name="nome" placeholder="Seu nome" required>
            <input type="email" name="email" placeholder="Seu email" required>
            <textarea name="mensagem" rows="5" placeholder="Sua mensagem..." required></textarea>
            <button type="submit">Enviar</button>
        </form>

    </div>
</main>

<footer>
    <p>© 2026 • Meu Blog</p>
</footer>

</body>
</html>
