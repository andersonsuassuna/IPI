<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Blog</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f9fafb;
            color: #111827;
        }

        header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 15px 30px;
        }

        nav {
            max-width: 1000px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 {
            font-size: 20px;
            font-weight: 600;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: #374151;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #111827;
        }

        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .posts h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .post {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .post:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
        }

        .post h3 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        .post p {
            color: #6b7280;
        }

        .post a {
            display: inline-block;
            margin-top: 10px;
            font-size: 14px;
            color: #2563eb;
            text-decoration: none;
        }

        .post a:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #6b7280;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            nav {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <h1>Meu Blog</h1>
            <ul>
                <li><a href="{% url 'home' %}">Início</a></li>
                <li><a href="{% url 'sobre' %}">Sobre</a></li>
                <li><a href="{% url 'contato' %}">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="posts">
            <h2>Últimas Postagens</h2>

            {% for post in posts %}
                <article class="post">
                    <h3>{{ post.titulo }}</h3>
                    <p>{{ post.resumo }}</p>
                    <a href="{% url 'post_detail' post.id %}">Ler mais →</a>
                </article>
            {% empty %}
                <p>Nenhuma postagem ainda.</p>
            {% endfor %}
        </section>
    </main>

    <footer>
        <p>© 2026 • Meu Blog</p>
    </footer>

</body>
</html>
