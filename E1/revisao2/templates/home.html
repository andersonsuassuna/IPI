{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escola - Home</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <header>
        <nav>
            <h1>Escola</h1>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="{% url 'aluno:home_aluno' %}">Área do Aluno</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">

        <section class="hero">
            <h2>Bem-vindo ao sistema escolar</h2>
            <p>Gerencie alunos, notas, frequência e muito mais.</p>
            <a href="{% url 'aluno:home_aluno' %}" class="btn">Entrar na Área do Aluno</a>
        </section>

        <section class="cards">

            <div class="card">
                <h3>Alunos</h3>
                <p>Cadastro e gerenciamento de alunos.</p>
            </div>

            <div class="card">
                <h3>Notas</h3>
                <p>Acompanhe desempenho escolar.</p>
            </div>

            <div class="card">
                <h3>Frequência</h3>
                <p>Controle de presença.</p>
            </div>

        </section>

    </main>

</body>
</html>
